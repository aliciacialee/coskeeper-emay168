  .timeline-wrap { padding: 1rem 0; }
  .day-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .day-btn {
    padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary); font-size: 13px; cursor: pointer;
    transition: all .18s; color: var(--color-text-secondary); font-weight: 400;
  }
  .day-btn:hover { background: var(--color-background-primary); color: var(--color-text-primary); }
  .day-btn.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); font-weight: 500; }
  .day-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem 1.5rem; }
  .day-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .day-badge { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .day-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin: 0; }
  .day-subtitle { font-size: 13px; color: var(--color-text-secondary); margin: 2px 0 0; }
  .section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--color-text-tertiary); margin: 1rem 0 .5rem; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: .75rem; }
  .tag { font-size: 12px; padding: 3px 10px; border-radius: 12px; font-weight: 400; }
  .tag-warn { background: var(--color-background-warning); color: var(--color-text-warning); }
  .tag-info { background: var(--color-background-info); color: var(--color-text-info); }
  .tag-ok   { background: var(--color-background-success); color: var(--color-text-success); }
  .tag-mute { background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .symptom-list { margin: 0; padding: 0; list-style: none; }
  .symptom-list li { font-size: 13.5px; color: var(--color-text-secondary); line-height: 1.75; padding-left: 16px; position: relative; }
  .symptom-list li::before { content: '·'; position: absolute; left: 4px; color: var(--color-text-tertiary); }
  .do-dont { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: .75rem; }
  .do-box, .dont-box { padding: .75rem; border-radius: var(--border-radius-md); font-size: 12.5px; line-height: 1.65; }
  .do-box   { background: var(--color-background-success); color: var(--color-text-success); }
  .dont-box { background: var(--color-background-danger);  color: var(--color-text-danger);  }
  .do-box strong, .dont-box strong { display: block; font-weight: 500; margin-bottom: 4px; font-size: 12px; letter-spacing: .04em; }
  .risk-bar-wrap { display: flex; align-items: center; gap: 8px; margin-top: .5rem; }
  .risk-bar-bg { flex: 1; height: 6px; border-radius: 3px; background: var(--color-background-secondary); overflow: hidden; }
  .risk-bar-fill { height: 100%; border-radius: 3px; transition: width .4s; }
  .risk-label { font-size: 12px; color: var(--color-text-secondary); min-width: 54px; text-align: right; }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: .9rem 0; }
  .key-note { font-size: 13px; color: var(--color-text-secondary); background: var(--color-background-secondary); border-left: 3px solid var(--color-border-secondary); border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; padding: .6rem .9rem; line-height: 1.6; margin-top: .75rem; }
  .key-note span { font-weight: 500; color: var(--color-text-primary); }
</style>

<div class="timeline-wrap">
  <div class="day-tabs" id="tabs"></div>
  <div class="day-card" id="card"></div>
</div>

  },
  {

function render(idx) {
  const d = days[idx];
  document.querySelectorAll('.day-btn').forEach((b,i) => b.classList.toggle('active', i === idx));

  const tagsHtml = d.tags.map(([t,type]) =>
    `<span class="tag tag-${type}">${t}</span>`).join('');

  const riskHtml = d.risks.map(([label, val]) => {
    const color = val >= 70 ? '#E24B4A' : val >= 45 ? '#EF9F27' : '#1D9E75';
    return `<div style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-bottom:3px">
        <span>${label}</span><span style="font-weight:500;color:${color}">${val}%</span>
      </div>
      <div class="risk-bar-bg"><div class="risk-bar-fill" style="width:${val}%;background:${color}"></div></div>
    </div>`;
  }).join('');

  const symsHtml = d.symptoms.map(s => `<li>${s}</li>`).join('');

  document.getElementById('card').innerHTML = `
    <div class="day-header">
      <div class="day-badge" style="background:${d.color.bg};color:${d.color.text}">D${d.num}</div>
      <div>
        <p class="day-title">${d.label}</p>
        <p class="day-subtitle">${d.phase}</p>
      </div>
    </div>
    <div class="tag-row">${tagsHtml}</div>
    <hr class="divider">
    <div class="section-label">膚況症狀</div>
    <ul class="symptom-list">${symsHtml}</ul>
    <hr class="divider">
    <div class="section-label">臨床風險評估</div>
    ${riskHtml}
    <hr class="divider">
    <div class="section-label">照護建議</div>
    <div class="do-dont">
      <div class="do-box">
        <strong>✓ 應做</strong>
        ${d.dos.map(s=>`<div style="margin-bottom:3px">${s}</div>`).join('')}
      </div>
      <div class="dont-box">
        <strong>✗ 禁止</strong>
        ${d.donts.map(s=>`<div style="margin-bottom:3px">${s}</div>`).join('')}
      </div>
    </div>
    <div class="key-note"><span>醫師提醒：</span>${d.note}</div>
  `;
}

const tabs = document.getElementById('tabs');
days.forEach((d,i) => {
  const btn = document.createElement('button');
  btn.className = 'day-btn';
  btn.textContent = `第 ${d.num} 天`;
  btn.onclick = () => render(i);
  tabs.appendChild(btn);
});

render(0);
</script>
